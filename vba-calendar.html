<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBA Calendar of Events</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f4f2;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .wrap {
      border-radius: 12px;
      border: 1px solid #ccc;
      overflow: hidden;
      background: #fff;
      max-width: 960px;
      margin: 0 auto;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
    }

    /* ── HEADER ── */
    .hdr {
      background: #354738;
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .hdr-title { color: #fff; font-size: 17px; font-weight: 600; flex: 1; min-width: 100px; }
    .hdr-nav { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
    .hdr-nav button {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: #ffffff; color: #354738;
      border: 2px solid #ffffff;
      border-radius: 8px; font-size: 22px; font-weight: 700;
      cursor: pointer; line-height: 1; padding: 0; flex-shrink: 0;
    }
    .hdr-nav button:hover { background: #e0e8e1; }
    .hdr-month { color: #fff; font-size: 26px; font-weight: 700; min-width: 200px; text-align: center; letter-spacing: .01em; }
    .hdr-toggle { display: flex; gap: 6px; }
    .hdr-toggle button {
      padding: 7px 14px;
      background: #ffffff; color: #354738;
      border: 2px solid #ffffff;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .hdr-toggle button.on { background: #243028; color: #ffffff; border-color: #243028; }
    .hdr-toggle button:not(.on):hover { background: #e0e8e1; }

    /* ── CONTROLS ── */
    .ctrl {
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .sbox { flex: 1; min-width: 150px; }
    .sbox input {
      width: 100%; height: 36px;
      padding: 0 12px;
      border: 1px solid #ccc; border-radius: 8px;
      font-size: 14px; background: #f7f7f5; color: #222; outline: none;
    }
    .sbox input::placeholder { color: #999; }
    .sbox input:focus { border-color: #354738; box-shadow: 0 0 0 2px rgba(53,71,56,.15); }
    .frow { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .flbl { font-size: 13px; color: #666; margin-right: 2px; }
    .sbtn {
      padding: 5px 10px;
      border: 1px solid #bbb; border-radius: 20px;
      font-size: 12px; cursor: pointer;
      background: #fff; color: #333; line-height: 1;
    }
    .sbtn:hover { background: #f0f0ee; }
    .sbtn.on { background: #354738; color: #fff; border-color: #354738; }

    /* ── LEGEND ── */
    .leg {
      padding: 8px 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .li { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; }
    .ld { width: 12px; height: 12px; border-radius: 3px; }

    /* ── RESULTS BAR ── */
    .rbar {
      padding: 7px 16px; font-size: 13px; color: #555;
      background: #f5f5f3; border-bottom: 1px solid #e8e8e8; display: none;
    }
    .rbar.on { display: block; }

    /* ── CALENDAR GRID ── */
    .drow { display: grid; grid-template-columns: repeat(7, 1fr); background: #243028; }
    .dh { padding: 7px 0; text-align: center; font-size: 12px; font-weight: 500; color: rgba(255,255,255,.85); }
    .gcells { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ddd; }
    .cell { background: #fff; min-height: 92px; padding: 5px; }
    .cell.dim { background: #f7f7f7; }
    .cell.today .dnum {
      background: #354738; color: #fff; border-radius: 50%;
      width: 22px; height: 22px; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 600;
    }
    .dnum { font-size: 12px; color: #999; margin-bottom: 3px; padding: 0 2px; display: inline-block; }
    .chip {
      display: block; width: 100%; padding: 4px 6px; border-radius: 5px;
      font-size: 11px; font-weight: 600; border: none; cursor: pointer;
      text-align: left; margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3; color: #fff;
    }
    .chip:hover { filter: brightness(1.12); }
    .chip-show { background: #c47a0a; }
    .chip-mtg  { background: #0a7a6e; }
    .chip-multi { background: linear-gradient(90deg, #c47a0a 50%, #0a7a6e 50%); }
    .morelink { font-size: 11px; color: #354738; border: none; background: none; cursor: pointer; font-weight: 600; padding: 2px; }
    .loading { padding: 40px; text-align: center; color: #888; font-size: 15px; grid-column: 1 / -1; }
    .err { padding: 24px 16px; text-align: center; color: #a33; font-size: 14px; grid-column: 1 / -1; }

    /* ── LIST VIEW ── */
    .lview { padding: 14px 16px; display: none; }
    .lview.on { display: block; }
    .litem {
      border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 12px 14px; margin-bottom: 10px;
      cursor: pointer; display: flex; gap: 14px; align-items: flex-start;
    }
    .litem:hover { box-shadow: 0 2px 10px rgba(0,0,0,.09); }
    .ldblock { text-align: center; min-width: 48px; flex-shrink: 0; }
    .ldday { font-size: 22px; font-weight: 600; color: #354738; line-height: 1; }
    .ldmon { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .05em; }
    .ldyr  { font-size: 11px; color: #aaa; }
    .linfo { flex: 1; min-width: 0; }
    .lname { font-size: 14px; font-weight: 600; color: #222; margin-bottom: 3px; }
    .lloc  { font-size: 13px; color: #777; margin-bottom: 7px; }
    .lbadges { display: flex; flex-wrap: wrap; gap: 5px; }
    .badge {
      padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 3px; color: #fff;
    }
    .b-show { background: #c47a0a; }
    .b-mtg  { background: #0a7a6e; }
    .b-onl  { background: #2d5fa8; }
    .b-mem  { background: #6b2fa0; }
    .b-pre  { background: #1e6e2f; }
    .nores  { padding: 32px; text-align: center; color: #aaa; font-size: 15px; }

    /* ── MODAL ── */
    .moverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 9999; display: none;
      align-items: center; justify-content: center; padding: 16px;
    }
    .moverlay.on { display: flex; }
    .mdl {
      background: #fff; border-radius: 12px;
      max-width: 500px; width: 100%; max-height: 88vh; overflow-y: auto;
    }
    .mtop {
      background: #354738; padding: 16px 18px 14px;
      border-radius: 12px 12px 0 0; position: relative;
    }
    .mtop h2 { font-size: 16px; font-weight: 600; color: #fff; padding-right: 36px; margin-bottom: 3px; }
    .mcat { font-size: 12px; color: rgba(255,255,255,.75); }
    .mclose {
      position: absolute; top: 10px; right: 12px;
      background: rgba(255,255,255,.2); border: none; color: #fff;
      border-radius: 6px; width: 28px; height: 28px;
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .mclose:hover { background: rgba(255,255,255,.35); }
    .mbody { padding: 16px 18px; }
    .mrow { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
    .micon { font-size: 18px; color: #354738; flex-shrink: 0; margin-top: 1px; }
    .mlbl  { font-size: 12px; color: #888; margin-bottom: 2px; }
    .mval  { font-size: 14px; color: #222; line-height: 1.5; }
    .mfoot { padding: 12px 18px; border-top: 1px solid #eee; display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── RESPONSIVE ── */
    @media (max-width: 540px) {
      body { padding: 0; }
      .wrap { border-radius: 0; box-shadow: none; }
      .hdr { padding: 10px 12px; gap: 8px; }
      .hdr-title { font-size: 14px; min-width: 80px; }
      .hdr-month { font-size: 18px; min-width: 110px; }
      .hdr-toggle button { padding: 6px 10px; font-size: 12px; }
      .hdr-nav button { width: 32px; height: 32px; font-size: 19px; }
      .ctrl { padding: 10px 12px; }
      .leg  { padding: 6px 12px; }
      .cell { min-height: 58px; padding: 3px; }
      .chip { font-size: 9.5px; padding: 3px 4px; }
      .dh   { font-size: 10px; padding: 5px 0; }
      .lview { padding: 10px 12px; }
      .litem { padding: 10px 12px; gap: 10px; }
      .ldday { font-size: 18px; }
      .mbody { padding: 12px 14px; }
      .mfoot { padding: 10px 14px; }
      .mtop  { padding: 12px 14px 10px; }
      .mtop h2 { font-size: 15px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <div class="hdr">
    <div class="hdr-title">VBA Calendar of Events</div>
    <div class="hdr-nav">
      <button id="prevBtn" aria-label="Previous month">&#8249;</button>
      <div class="hdr-month" id="monthLabel">Loading…</div>
      <button id="nextBtn" aria-label="Next month">&#8250;</button>
    </div>
    <div class="hdr-toggle">
      <button class="on" id="calBtn">Calendar</button>
      <button id="listBtn">List</button>
    </div>
  </div>

  <div class="ctrl">
    <div class="sbox">
      <input type="text" id="srch" placeholder="Search events, locations, studs…" aria-label="Search events">
    </div>
    <div class="frow">
      <span class="flbl">State:</span>
      <button class="sbtn on" data-s="ALL">All</button>
      <button class="sbtn" data-s="NSW">NSW</button>
      <button class="sbtn" data-s="QLD">QLD</button>
      <button class="sbtn" data-s="SA">SA</button>
      <button class="sbtn" data-s="TAS">TAS</button>
      <button class="sbtn" data-s="VIC">VIC</button>
      <button class="sbtn" data-s="WA">WA</button>
      <button class="sbtn" data-s="ACT">ACT</button>
      <button class="sbtn" data-s="ONLINE">National/Online</button>
    </div>
  </div>

  <div class="leg">
    <div class="li"><div class="ld" style="background:#c47a0a"></div>Show / Field Day</div>
    <div class="li"><div class="ld" style="background:#0a7a6e"></div>VBA Meeting / Education Forum</div>
    <div class="li"><div class="ld" style="background:#2d5fa8"></div>Online</div>
    <div class="li"><div class="ld" style="background:#6b2fa0"></div>Members only</div>
  </div>

  <div class="rbar" id="rbar"></div>

  <div id="calView">
    <div class="drow">
      <div class="dh">Mon</div><div class="dh">Tue</div><div class="dh">Wed</div>
      <div class="dh">Thu</div><div class="dh">Fri</div><div class="dh">Sat</div><div class="dh">Sun</div>
    </div>
    <div class="gcells" id="grid"><div class="loading">Loading events…</div></div>
  </div>

  <div class="lview" id="listView">
    <div id="listItems"></div>
  </div>

</div>

<div class="moverlay" id="moverlay" role="dialog" aria-modal="true" aria-labelledby="mtitle">
  <div class="mdl">
    <div class="mtop">
      <h2 id="mtitle"></h2>
      <div class="mcat" id="mcat"></div>
      <button class="mclose" id="mclose" aria-label="Close">&#x2715;</button>
    </div>
    <div class="mbody" id="mbody"></div>
    <div class="mfoot" id="mfoot"></div>
  </div>
</div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbzHY_4DjGW4aU8Xqr-QDiciVpkJBaJepCjvBrFhAf6G24FLfONJB6blKLwq7w84TzlN3Q/exec";
  const MO  = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  let EVTS = [], cY, cM, state = "ALL", term = "", listMode = false;

  function init() { const n = new Date(); cY = n.getFullYear(); cM = n.getMonth(); }
  function pd(s)  { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
  function ff(d)  { return d.toLocaleDateString("en-AU", {weekday:"long", day:"numeric", month:"long", year:"numeric"}); }

  function groupEvents(raw) {
    const map = {};
    raw.forEach(r => {
      const key = r.name + "|" + (r.state || "") + (r.cats || []).join(",");
      if (!map[key]) {
        map[key] = {
          id: r.id, label: r.label || "", name: r.name || "", dates: [],
          location: r.location || "", state: r.state || "", desc: r.desc || "",
          present: r.present || "No", studs: r.studs || "",
          cats: Array.isArray(r.cats) && r.cats.length ? r.cats : ["show"],
          online: !!r.online, link: r.link || "", members: !!r.members
        };
      }
      if (r.date) map[key].dates.push(r.date);
    });
    Object.values(map).forEach(e => e.dates.sort());
    return Object.values(map);
  }

  async function loadEvents() {
    try {
      const res  = await fetch(API);
      const data = await res.json();
      if (data.success && Array.isArray(data.events)) {
        EVTS = groupEvents(data.events);
      } else {
        showErr("Could not load events from Google Sheet.");
        return;
      }
    } catch(e) {
      showErr("Network error — please refresh to try again.");
      return;
    }
    render();
  }

  function showErr(msg) {
    document.getElementById("grid").innerHTML = `<div class="err">&#9888; ${msg}</div>`;
    document.getElementById("monthLabel").textContent = "Error";
  }

  function filtered() {
    return EVTS.filter(e => {
      const sm = state === "ALL" || (state === "ONLINE" && e.online) || e.state === state;
      const t  = term.toLowerCase();
      const tm = !t || [e.name, e.label, e.location, e.studs, e.desc, e.state].join(" ").toLowerCase().includes(t);
      return sm && tm;
    });
  }

  function chipCls(c) {
    if (c.includes("show") && c.includes("meeting")) return "chip chip-multi";
    if (c.includes("meeting")) return "chip chip-mtg";
    return "chip chip-show";
  }

  function catLbl(c) {
    const r = [];
    if (c.includes("show"))    r.push("Show / Field Day");
    if (c.includes("meeting")) r.push("VBA Meeting / Education Forum");
    return r.join(" + ") || "Event";
  }

  function renderCal() {
    document.getElementById("monthLabel").textContent = MO[cM] + " " + cY;
    const g   = document.getElementById("grid"); g.innerHTML = "";
    const f   = filtered();
    let dow   = new Date(cY, cM, 1).getDay(); dow = dow === 0 ? 6 : dow - 1;
    const dim  = new Date(cY, cM + 1, 0).getDate();
    const pdim = new Date(cY, cM, 0).getDate();
    const tot  = Math.ceil((dow + dim) / 7) * 7;
    const n    = new Date();
    const tds  = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;

    for (let i = 0; i < tot; i++) {
      const cell = document.createElement("div"); cell.className = "cell";
      let d, m, y, other = false;
      if (i < dow) {
        d = pdim - dow + 1 + i; m = cM === 0 ? 11 : cM - 1; y = cM === 0 ? cY - 1 : cY; other = true;
      } else if (i >= dow + dim) {
        d = i - dow - dim + 1; m = cM === 11 ? 0 : cM + 1; y = cM === 11 ? cY + 1 : cY; other = true;
      } else {
        d = i - dow + 1; m = cM; y = cY;
      }
      if (other) cell.classList.add("dim");
      const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      if (ds === tds) cell.classList.add("today");
      const dn = document.createElement("div"); dn.className = "dnum"; dn.textContent = d; cell.appendChild(dn);
      const de = f.filter(e => e.dates.includes(ds));
      de.slice(0, 2).forEach(e => {
        const b = document.createElement("button"); b.className = chipCls(e.cats); b.textContent = e.label;
        b.onclick = () => openM(e); cell.appendChild(b);
      });
      if (de.length > 2) {
        const ml = document.createElement("button"); ml.className = "morelink";
        ml.textContent = "+" + (de.length - 2) + " more"; ml.onclick = () => openM(de[2]); cell.appendChild(ml);
      }
      g.appendChild(cell);
    }
  }

  function renderList() {
    const c = document.getElementById("listItems"); c.innerHTML = "";
    const f = filtered();
    if (!f.length) { c.innerHTML = '<div class="nores">No events match your search.</div>'; return; }
    const rows = [];
    f.forEach(e => e.dates.forEach(d => rows.push({e, d})));
    rows.sort((a, b) => a.d.localeCompare(b.d));
    const seen = new Set();
    rows.forEach(({e, d}) => {
      const k = e.id + "|" + d; if (seen.has(k)) return; seen.add(k);
      const dt   = pd(d);
      const item = document.createElement("div"); item.className = "litem";
      const badges = [];
      if (e.cats.includes("show"))    badges.push('<span class="badge b-show">Show / Field Day</span>');
      if (e.cats.includes("meeting")) badges.push('<span class="badge b-mtg">VBA Meeting</span>');
      if (e.present === "Yes")        badges.push('<span class="badge b-pre">&#10003; Valais present</span>');
      if (e.online)                   badges.push('<span class="badge b-onl">Online</span>');
      if (e.members)                  badges.push('<span class="badge b-mem">Members only</span>');
      item.innerHTML = `
        <div class="ldblock">
          <div class="ldday">${dt.getDate()}</div>
          <div class="ldmon">${MO[dt.getMonth()].slice(0,3)}</div>
          <div class="ldyr">${dt.getFullYear()}</div>
        </div>
        <div class="linfo">
          <div class="lname">${e.name}</div>
          <div class="lloc">&#128205; ${e.location}${e.state ? ", " + e.state : ""}</div>
          <div class="lbadges">${badges.join("")}</div>
        </div>`;
      item.onclick = () => openM(e); c.appendChild(item);
    });
  }

  function openM(e) {
    document.getElementById("mtitle").textContent = e.name;
    document.getElementById("mcat").textContent   = catLbl(e.cats);
    const dates = e.dates.map(d => ff(pd(d))).join("<br>");
    let b = `
      <div class="mrow"><div class="micon">&#128197;</div><div><div class="mlbl">Date(s)</div><div class="mval">${dates}</div></div></div>
      <div class="mrow"><div class="micon">&#128205;</div><div><div class="mlbl">Location</div><div class="mval">${e.location}${e.state ? " — " + e.state : ""}</div></div></div>`;
    if (e.desc)  b += `<div class="mrow"><div class="micon">&#9432;</div><div><div class="mlbl">About this event</div><div class="mval">${e.desc}</div></div></div>`;
    b += `<div class="mrow"><div class="micon">&#128017;</div><div><div class="mlbl">Valais Blacknose present?</div><div class="mval">${e.present}</div></div></div>`;
    if (e.studs) b += `<div class="mrow"><div class="micon">&#127968;</div><div><div class="mlbl">Studs attending</div><div class="mval">${e.studs}</div></div></div>`;
    if (e.online && e.link) b += `<div class="mrow"><div class="micon">&#128279;</div><div><div class="mlbl">Online access</div><div class="mval"><a href="${e.link}" target="_blank" rel="noopener" style="color:#354738">Join online &#8599;</a></div></div></div>`;
    document.getElementById("mbody").innerHTML = b;
    const ft = [];
    if (e.cats.includes("show"))    ft.push('<span class="badge b-show">Show / Field Day</span>');
    if (e.cats.includes("meeting")) ft.push('<span class="badge b-mtg">VBA Meeting / Education Forum</span>');
    if (e.present === "Yes")        ft.push('<span class="badge b-pre">&#10003; Valais present</span>');
    if (e.online)                   ft.push('<span class="badge b-onl">Online event</span>');
    if (e.members)                  ft.push('<span class="badge b-mem">Members only</span>');
    document.getElementById("mfoot").innerHTML = ft.join("");
    document.getElementById("moverlay").classList.add("on");
  }

  function closeM() { document.getElementById("moverlay").classList.remove("on"); }

  function goList() {
    listMode = true;
    document.getElementById("calView").style.display = "none";
    document.getElementById("listView").classList.add("on");
    document.getElementById("listBtn").classList.add("on");
    document.getElementById("calBtn").classList.remove("on");
  }

  function goCal() {
    listMode = false;
    document.getElementById("calView").style.display = "block";
    document.getElementById("listView").classList.remove("on");
    document.getElementById("calBtn").classList.add("on");
    document.getElementById("listBtn").classList.remove("on");
  }

  function updateBar() {
    const bar = document.getElementById("rbar");
    const n   = filtered().length;
    if (term || state !== "ALL") {
      let msg = `${n} event${n !== 1 ? "s" : ""} found`;
      if (state !== "ALL") msg += ` in ${state === "ONLINE" ? "National/Online" : state}`;
      if (term) msg += ` matching "${term}"`;
      bar.textContent = msg; bar.classList.add("on");
    } else { bar.classList.remove("on"); }
  }

  function render() { updateBar(); if (listMode) renderList(); else renderCal(); }

  document.getElementById("prevBtn").onclick = () => { cM--; if (cM < 0)  { cM = 11; cY--; } render(); };
  document.getElementById("nextBtn").onclick = () => { cM++; if (cM > 11) { cM = 0;  cY++; } render(); };
  document.getElementById("calBtn").onclick  = () => { goCal();  render(); };
  document.getElementById("listBtn").onclick = () => { goList(); render(); };
  document.getElementById("mclose").onclick  = closeM;
  document.getElementById("moverlay").onclick = e => { if (e.target === e.currentTarget) closeM(); };
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeM(); });

  document.querySelectorAll(".sbtn").forEach(b => {
    b.onclick = () => {
      document.querySelectorAll(".sbtn").forEach(x => x.classList.remove("on"));
      b.classList.add("on"); state = b.dataset.s;
      if (state !== "ALL") goList(); else goCal();
      render();
    };
  });

  let st;
  document.getElementById("srch").oninput = e => {
    clearTimeout(st); st = setTimeout(() => {
      term = e.target.value.trim();
      if (term) goList(); else if (state === "ALL") goCal();
      render();
    }, 220);
  };

  init();
  loadEvents();
</script>

</body>
</html>
